<!-- Hero Section -->
<header role="banner" class="bg-navy text-white py-16 px-4 hero-section relative" style="background-image: url('{{basePath}}images/abstracts/svg-12-animated/5.svg'); background-size: cover; background-position: center;">
    <!-- Decorative elements -->
    <div class="hero-decorative-circle hero-decorative-circle-1"></div>
    <div class="hero-decorative-circle hero-decorative-circle-2"></div>
    <div class="hero-decorative-circle hero-decorative-circle-3"></div>

    <div class="max-w-6xl mx-auto relative z-10">
        <!-- Title -->
        <h1 class="font-heading text-4xl md:text-5xl lg:text-6xl font-bold mb-4 text-navy">
            {{heroTitle}}
        </h1>

        <!-- Subtitle -->
        <p class="font-body text-lg md:text-xl text-navy mb-4 max-w-2xl">
            {{heroSubtitle}}
        </p>
    </div>
</header>
