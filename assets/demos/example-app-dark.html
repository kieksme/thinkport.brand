<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thinkport Beispiel-App (Dark)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0B2649;
      --navy-bg: #1E2A45;
      --aqua: #00C6E0;
      --fuchsia: #FF8A50;
      --bg: #1E2A45;
      --bg-card: #0D2D57;
      --text: #f9fafb;
      --text-muted: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100%;
    }
    .header {
      background: var(--navy);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header .brand { font-weight: 700; font-size: 1.1rem; color: var(--aqua); }
    .header nav { display: flex; gap: 16px; }
    .header a { color: var(--text-muted); text-decoration: none; font-size: 13px; }
    .header a:hover { color: var(--aqua); }
    .main {
      padding: 20px 16px;
    }
    .main h2 {
      margin: 0 0 16px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 380px) {
      .cards { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: var(--aqua);
      box-shadow: 0 4px 12px rgba(0, 198, 224, 0.15);
    }
    .card h3 {
      margin: 0 0 6px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--aqua);
    }
    .card p {
      margin: 0;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .card.card-aqua { border-left: 3px solid var(--aqua); }
    .card.card-fuchsia { border-left: 3px solid var(--fuchsia); }
  </style>
</head>
<body>
  <header class="header">
    <span class="brand">Thinkport</span>
    <nav>
      <a href="#cloud">Cloud</a>
      <a href="#data">Data & AI</a>
    </nav>
  </header>
  <main class="main">
    <h2>Kompetenzen im Überblick</h2>
    <div class="cards">
      <div class="card card-aqua">
        <h3>Cloud-Infrastruktur</h3>
        <p>Cloud-native Plattformen auf AWS, Azure und GCP – sicher und performant.</p>
      </div>
      <div class="card card-fuchsia">
        <h3>Data & AI</h3>
        <p>Skalierbare Datenplattformen und KI-Lösungen mit Fokus auf Business-Mehrwert.</p>
      </div>
    </div>
  </main>
</body>
</html>
