<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1024" height="1024">
<style>
  @keyframes rotate1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rotate2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
  @keyframes colorShift {
    0% { fill-opacity: 0.2; }
    25% { fill-opacity: 0.8; }
    50% { fill-opacity: 0.2; }
    75% { fill-opacity: 0.8; }
    100% { fill-opacity: 0.2; }
  }
  @keyframes zoom {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  /* Gruppe 1 - Startet sofort */
  .polygon-1 { animation: rotate1 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; }
  .polygon-2 { animation: rotate2 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 3s; }
  .polygon-3 { animation: rotate1 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 6s; }
  
  /* Gruppe 2 - Startet nach 2s */
  .polygon-4 { animation: rotate2 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 9s; }
  .polygon-5 { animation: rotate1 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 12s; }
  .polygon-6 { animation: rotate2 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 15s; }
  
  /* Gruppe 3 - Startet nach 4s */
  .polygon-7 { animation: rotate1 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 18s; }
  .polygon-8 { animation: rotate2 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 21s; }
  .polygon-9 { animation: rotate1 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 24s; }
  
  /* Gruppe 4 - Startet nach 6s */
  .polygon-10 { animation: rotate2 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 27s; }
  .polygon-11 { animation: rotate1 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 30s; }
  .polygon-12 { animation: rotate2 180s linear infinite, colorShift 24s ease-in-out infinite, zoom 36s ease-in-out infinite; transform-origin: center; animation-delay: 33s; }
</style>
<rect x="0" y="0" width="1024" height="1024" fill="#644883" />
<g transform="scale(4.000000) translate(0.5 0.5)">
<polygon class="polygon-1" fill="#59454d" fill-opacity="0.501961" points="7,130 225,41 166,236" />
<polygon class="polygon-2" fill="#4c596d" fill-opacity="0.501961" points="126,24 8,114 69,228" />
<polygon class="polygon-3" fill="#0e141a" fill-opacity="0.501961" points="254,-16 264,74 -16,8" />
<polygon class="polygon-4" fill="#0e141a" fill-opacity="0.501961" points="-16,251 252,271 271,155" />
<polygon class="polygon-5" fill="#59454d" fill-opacity="0.501961" points="85,230 233,154 145,26" />
<polygon class="polygon-6" fill="#1c2834" fill-opacity="0.501961" points="74,-14 -16,-1 3,271" />
<polygon class="polygon-7" fill="#496165" fill-opacity="0.501961" points="47,198 84,42 13,112" />
<polygon class="polygon-8" fill="#7c7248" fill-opacity="0.501961" points="182,271 250,-16 271,271" />
<polygon class="polygon-9" fill="#69574e" fill-opacity="0.501961" points="149,242 239,149 185,91" />
<polygon class="polygon-10" fill="#0e141a" fill-opacity="0.501961" points="-15,123 -12,259 122,271" />
<polygon class="polygon-11" fill="#5d4a6e" fill-opacity="0.501961" points="38,184 95,230 140,19" />
