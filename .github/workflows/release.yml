name: Create Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Get release version
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create assets directory structure
        run: |
          mkdir -p release-assets

      - name: Generate staff assets from Thinkport API
        env:
          THINKPORT_API_USERNAME: ${{ secrets.THINKPORT_API_USERNAME }}
          THINKPORT_API_PASSWORD: ${{ secrets.THINKPORT_API_PASSWORD }}
        run: |
          if [ -z "${THINKPORT_API_USERNAME}" ] || [ -z "${THINKPORT_API_PASSWORD}" ]; then
            echo "::warning::Thinkport staff assets were NOT generated – missing THINKPORT_API_USERNAME and/or THINKPORT_API_PASSWORD GitHub Action secrets."
            echo "Skipping staff asset generation step."
            exit 0
          fi

          pnpm generate:staff:assets || {
            echo "::warning::Staff asset generation failed – continuing without staff ZIPs (see logs above for details)."
          }

      - name: Copy release assets
        run: |
          # Copy all assets directory (includes logos, colors, fonts, templates, guidelines)
          cp -r assets release-assets/
          
          # Copy root level documentation files
          cp README.md release-assets/
          cp LICENSE release-assets/

      - name: Create ZIP archives
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Create complete package ZIP
          cd release-assets
          zip -r ../thinkport-assets-v${VERSION}.zip .
          cd ..
          
          # Create logos-only ZIP
          mkdir -p release-assets-logos
          cp -r assets/logos release-assets-logos/logos
          cp assets/favicon.svg release-assets-logos/ 2>/dev/null || true
          cd release-assets-logos
          zip -r ../thinkport-logos-v${VERSION}.zip .
          cd ..
          
          # Create colors-only ZIP
          mkdir -p release-assets-colors
          cp -r assets/colors release-assets-colors/colors
          cd release-assets-colors
          zip -r ../thinkport-colors-v${VERSION}.zip .
          cd ..
          
          # Create fonts-only ZIP
          mkdir -p release-assets-fonts
          cp -r assets/fonts release-assets-fonts/fonts
          cd release-assets-fonts
          zip -r ../thinkport-fonts-v${VERSION}.zip .
          cd ..
          
          # Create icons-only ZIP
          mkdir -p release-assets-icons
          cp -r assets/icons release-assets-icons/icons 2>/dev/null || true
          cd release-assets-icons
          if [ -d icons ] && [ "$(ls -A icons)" ]; then
            zip -r ../thinkport-icons-v${VERSION}.zip .
          fi
          cd ..

          # Create staff assets ZIPs if staff directory exists AND contains files
          if [ -d release-assets/staff ] && find release-assets/staff -type f -print -quit | grep -q .; then
            cd release-assets
            zip -r ../thinkport-staff-assets-v${VERSION}.zip staff

            # Per-person staff ZIPs
            if [ -d staff/email-footers ]; then
              cd staff
              for footer in email-footers/email-footer-*.html; do
                if [ ! -f "$footer" ]; then
                  continue
                fi
                slug="${footer##*/}"
                slug="${slug#email-footer-}"
                slug="${slug%.html}"

                tmpdir="person-${slug}"
                rm -rf "$tmpdir"
                mkdir -p "$tmpdir"

                # Avatars for this person
                if ls "avatars/avatar-${slug}-"*.png >/dev/null 2>&1; then
                  mkdir -p "$tmpdir/avatars"
                  cp "avatars/avatar-${slug}-"*.png "$tmpdir/avatars"/
                fi

                # Business cards for this person (stored in per-slug directory)
                if [ -d "business-cards/${slug}" ]; then
                  mkdir -p "$tmpdir/business-cards"
                  cp -r "business-cards/${slug}/." "$tmpdir/business-cards"/
                fi

                # Email footers (HTML + text)
                if [ -f "email-footers/email-footer-${slug}.html" ]; then
                  mkdir -p "$tmpdir/email-footers"
                  cp "email-footers/email-footer-${slug}.html" "$tmpdir/email-footers"/
                fi
                if [ -f "email-footers-text/email-footer-${slug}.txt" ]; then
                  mkdir -p "$tmpdir/email-footers-text"
                  cp "email-footers-text/email-footer-${slug}.txt" "$tmpdir/email-footers-text"/
                fi

                # Only create ZIP if this person actually has files
                if find "$tmpdir" -type f -print -quit | grep -q .; then
                  zip -r "../../thinkport-staff-${slug}-v${VERSION}.zip" "$tmpdir"
                fi
                rm -rf "$tmpdir"
              done
              cd ..
            fi

            cd ..
          else
            echo "No staff files found – skipping staff ZIP creation"
          fi

      - name: Generate Release README
        id: readme
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          
          # Extract changelog section for current version
          if [ -f CHANGELOG.md ]; then
            # Extract the changelog entry for this version (from ## [VERSION] to next ## or end of file)
            # Use awk to extract between version headers
            CHANGELOG_ENTRY=$(awk -v version="${VERSION}" '
              /^## \[/ { 
                if (found) exit
                if ($0 ~ "## \\[" version "\\]") {
                  found = 1
                  next
                }
              }
              found {
                if (/^## \[/) exit
                print
              }
            ' CHANGELOG.md)
            
            if [ -n "$CHANGELOG_ENTRY" ] && [ "$CHANGELOG_ENTRY" != "" ]; then
              # Convert changelog format to release notes format
              # Use a prominent header with visual separation
              CHANGELOG_SECTION=$'\n---\n\n'
              CHANGELOG_SECTION+="## ✨ What\'s New in v${VERSION}"$'\n\n'
              
              # Format the changelog entries - preserve structure but improve formatting
              CHANGELOG_SECTION+=$(echo "$CHANGELOG_ENTRY" | \
                sed 's/^\* \*\*\([^:]*\):\*\*/- **\1**:/' | \
                sed 's/^\* /  - /' | \
                sed 's/^### Features/### ✨ Features/' | \
                sed 's/^### Bug Fixes/### 🐛 Bug Fixes/' | \
                sed 's/^### Miscellaneous Chores/### 🔧 Miscellaneous Chores/')
              
              # Add spacing and visual separator at the end
              CHANGELOG_SECTION+=$'\n\n---\n'
              
              # Save to temp file for insertion
              echo "$CHANGELOG_SECTION" > /tmp/changelog_section.txt
            else
              echo "No changelog entry found for version ${VERSION}"
            fi
          else
            echo "CHANGELOG.md not found"
          fi
          
          # Replace placeholders in template
          sed -e "s/\${VERSION}/${VERSION}/g" \
              -e "s/\${RELEASE_DATE}/${RELEASE_DATE}/g" \
              RELEASE_README.md > /tmp/release_readme_temp.md
          
          # Replace CHANGELOG_SECTION placeholder
          if [ -f /tmp/changelog_section.txt ] && [ -s /tmp/changelog_section.txt ]; then
            # Use awk to insert changelog content
            awk '
              /\$\{CHANGELOG_SECTION\}/ {
                while ((getline line < "/tmp/changelog_section.txt") > 0) {
                  print line
                }
                close("/tmp/changelog_section.txt")
                next
              }
              { print }
            ' /tmp/release_readme_temp.md > RELEASE_README.md
          else
            # Remove placeholder if no changelog entry
            sed 's|\${CHANGELOG_SECTION}||g' /tmp/release_readme_temp.md > RELEASE_README.md
          fi
          
          echo "readme_path=RELEASE_README.md" >> $GITHUB_OUTPUT

      - name: Upload complete package ZIP to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./thinkport-assets-v${{ steps.version.outputs.version }}.zip
          asset_name: thinkport-assets-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload logos ZIP to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./thinkport-logos-v${{ steps.version.outputs.version }}.zip
          asset_name: thinkport-logos-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload colors ZIP to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./thinkport-colors-v${{ steps.version.outputs.version }}.zip
          asset_name: thinkport-colors-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload fonts ZIP to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./thinkport-fonts-v${{ steps.version.outputs.version }}.zip
          asset_name: thinkport-fonts-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload icons ZIP to release
        if: hashFiles('thinkport-icons-v*.zip') != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./thinkport-icons-v${{ steps.version.outputs.version }}.zip
          asset_name: thinkport-icons-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload staff assets ZIP to release
        if: ${{ hashFiles('thinkport-staff-assets-v*.zip') != '' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./thinkport-staff-assets-v${{ steps.version.outputs.version }}.zip
          asset_name: thinkport-staff-assets-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

      - name: Upload per-person staff ZIPs to release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.event.release.tag_name }}"

          for file in thinkport-staff-*-v${VERSION}.zip; do
            if [ ! -f "$file" ]; then
              continue
            fi
            echo "Uploading $file to release $TAG"
            gh release upload "$TAG" "$file" --repo "${{ github.repository }}" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Release Notes
        run: |
          gh release edit ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --notes-file RELEASE_README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
