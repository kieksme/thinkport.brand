name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          target-branch: main
          config-file: release-please-config.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Read release notes generated by Release Please
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          if [ -z "${TAG_NAME}" ]; then
            echo "No release tag returned by release-please. Skipping rewrite."
            exit 0
          fi

          gh release view "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --json body \
            --jq '.body // ""' > /tmp/release-notes-raw.md

          if [ ! -s /tmp/release-notes-raw.md ]; then
            echo "Release notes body is empty. Creating a fallback body."
            cat > /tmp/release-notes-raw.md <<'EOF'
          ## Release Update

          This release includes multiple improvements and updates.
          EOF
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Install GitHub Copilot CLI
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm install -g @github/copilot

      - name: Rewrite release notes for non-technical readers
        if: ${{ steps.release.outputs.release_created == 'true' }}
        continue-on-error: true
        run: |
          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "COPILOT_GITHUB_TOKEN is not set. Skipping rewrite and keeping Release Please notes."
            cp /tmp/release-notes-raw.md /tmp/release-notes-rewritten.md
            { echo "<!-- rewritten-by-copilot-cli -->"; cat /tmp/release-notes-rewritten.md; } > /tmp/release-notes-final.md
            mv /tmp/release-notes-final.md /tmp/release-notes-rewritten.md
            exit 0
          fi

          cat > /tmp/release-notes-prompt.md <<'EOF'
          Rewrite the release notes below for non-technical readers.

          Requirements:
          - Keep all factual changes, but explain in plain language.
          - Remove commit hashes and low-level implementation wording.
          - Focus on user-visible value and business impact.
          - Keep concise markdown with this structure:
            1) One short intro paragraph.
            2) "## Highlights" with bullet points.
            3) "## Who benefits" with bullet points.
          - Use clear, neutral English.
          - Do not invent features that are not in the source text.
          - Keep this exact marker as the first line:
            <!-- rewritten-by-copilot-cli -->

          Source release notes:
          EOF

          cat /tmp/release-notes-prompt.md /tmp/release-notes-raw.md > /tmp/copilot-release-notes-input.md

          if copilot -p "$(cat /tmp/copilot-release-notes-input.md)" > /tmp/release-notes-rewritten.md; then
            if [ ! -s /tmp/release-notes-rewritten.md ]; then
              cp /tmp/release-notes-raw.md /tmp/release-notes-rewritten.md
            fi
          else
            cp /tmp/release-notes-raw.md /tmp/release-notes-rewritten.md
          fi

          if ! rg -q '^<!-- rewritten-by-copilot-cli -->' /tmp/release-notes-rewritten.md; then
            cp /tmp/release-notes-raw.md /tmp/release-notes-rewritten.md
            { echo "<!-- rewritten-by-copilot-cli -->"; cat /tmp/release-notes-rewritten.md; } > /tmp/release-notes-final.md
            mv /tmp/release-notes-final.md /tmp/release-notes-rewritten.md
          fi
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Update GitHub release notes
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          if [ -z "${TAG_NAME}" ]; then
            echo "No release tag returned by release-please. Skipping release note update."
            exit 0
          fi

          gh release edit "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --notes-file /tmp/release-notes-rewritten.md
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}
        continue-on-error: true
