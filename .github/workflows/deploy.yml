name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (release tag)
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Checkout
        if: github.event_name != 'release'
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      - name: Clean pnpm artifacts
        run: rm -rf node_modules package-lock.json
        # Ensures a clean install so @tailwindcss/oxide native bindings are installed for this runner (Linux)

      - name: Install dependencies
        run: pnpm install
        # No --frozen-lockfile: @tailwindcss/oxide needs platform-specific optional deps (Linux in CI)

      - name: Build
        env:
          # GitHub Pages project sites are served at /<repo-name>/ (e.g. kieksme.github.io/thinkport.brand/).
          # Vite uses this base for all asset URLs (JS, CSS). Use root only when using a custom domain.
          VITE_BASE_PATH: '/thinkport.brand/'
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Optional: keep a Netlify site in sync when the same workflow builds for GitHub Pages.
  # Repository secret NETLIFY_BUILD_HOOK_URL = full URL from Netlify → Build hooks (do not commit).
  netlify-build-hook:
    runs-on: ubuntu-latest
    needs: build
    if: secrets.NETLIFY_BUILD_HOOK_URL != ''
    steps:
      - name: Trigger Netlify build
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: curl -fsS -X POST -d '' "$NETLIFY_BUILD_HOOK_URL"
